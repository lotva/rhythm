commit-msg:
  commands:
    'lint commit message':
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    lint-styles:
      glob: '*.{astro,css}'
      run: pnpm exec stylelint --fix {staged_files}
      stage_fixed: true
    format:
      glob: '*.{astro,ts,json,css,yaml,html}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
